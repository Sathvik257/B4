<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #7f7fd5, #86a8e7, #91eae4);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .game-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 35px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      animation: slideIn 0.8s ease;
    }

    h2 {
      color: #333;
      animation: floatText 2s infinite ease-in-out;
    }

    .choices {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 25px 0;
    }

    button {
      width: 95px;
      height: 95px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(145deg, #667eea, #764ba2);
      color: white;
      font-size: 34px;
      cursor: pointer;
      box-shadow: 0 8px 0 #4b3f91, 0 15px 25px rgba(0,0,0,0.25);
      transition: 0.25s;
    }

    button:hover {
      transform: translateY(-8px) scale(1.08);
      box-shadow: 0 14px 0 #4b3f91, 0 22px 35px rgba(0,0,0,0.3);
    }

    button:active {
      transform: translateY(5px) scale(0.95);
      box-shadow: 0 3px 0 #4b3f91, 0 8px 15px rgba(0,0,0,0.25);
    }

    .battle {
      font-size: 45px;
      min-height: 60px;
      margin: 20px 0;
    }

    .shake {
      animation: shakeHands 0.6s ease;
    }

    #result {
      font-size: 24px;
      color: #333;
      min-height: 35px;
      font-weight: bold;
    }

    .win {
      color: green;
      animation: pop 0.5s ease;
    }

    .lose {
      color: red;
      animation: fall 0.5s ease;
    }

    .draw {
      color: orange;
      animation: bounce 0.5s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-50px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes floatText {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes shakeHands {
      0% { transform: rotate(0deg) scale(1); }
      20% { transform: rotate(-15deg) scale(1.1); }
      40% { transform: rotate(15deg) scale(1.1); }
      60% { transform: rotate(-10deg) scale(1.05); }
      80% { transform: rotate(10deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1); }
    }

    @keyframes pop {
      0% {
        transform: scale(0.4);
        opacity: 0;
      }
      70% {
        transform: scale(1.3);
        opacity: 1;
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-15px);
      }
      70% {
        transform: translateY(5px);
      }
    }
  </style>
</head>

<body>
  <div class="game-box">
    <h2>Rock Paper Scissors</h2>

    <div class="choices">
      <button onclick="play('rock')">✊</button>
      <button onclick="play('paper')">✋</button>
      <button onclick="play('scissors')">✌️</button>
    </div>

    <div class="battle" id="battle">🎮</div>
    <h4 id="result">Choose your move</h4>
  </div>

  <script>
    function play(user) {
      const choices = ["rock", "paper", "scissors"];
      const emojis = {
        rock: "✊",
        paper: "✋",
        scissors: "✌️"
      };

      const comp = choices[Math.floor(Math.random() * 3)];
      const result = document.getElementById("result");
      const battle = document.getElementById("battle");

      battle.innerHTML = emojis[user] + " VS " + emojis[comp];
      battle.classList.remove("shake");
      void battle.offsetWidth;
      battle.classList.add("shake");

      result.className = "";

      if (user === comp) {
        result.innerHTML = "Draw 🤝";
        result.classList.add("draw");
      } else if (
        (user === "rock" && comp === "scissors") ||
        (user === "paper" && comp === "rock") ||
        (user === "scissors" && comp === "paper")
      ) {
        result.innerHTML = "You Win 🎉";
        result.classList.add("win");
      } else {
        result.innerHTML = "You Lose 😢";
        result.classList.add("lose");
      }
    }
  </script>
</body>
</html>
